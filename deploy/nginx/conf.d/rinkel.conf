# ── rinkel.conf — Virtual host configuration ──────────────────────────────────
# Replace api.yourdomain.nl with your actual domain.
# SSL cert paths assume Certbot with standard location.

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.nl;

    # Certbot ACME challenge — must be HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main server ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.yourdomain.nl;

    # ── SSL certificates (managed by Certbot) ─────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.nl/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.yourdomain.nl/chain.pem;

    # OCSP stapling — verify cert is not revoked without client round-trip
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"               always;
    add_header X-Content-Type-Options    "nosniff"            always;
    add_header X-XSS-Protection         "1; mode=block"      always;
    add_header Referrer-Policy          "strict-origin"       always;
    add_header Permissions-Policy       "geolocation=()"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Server header suppressed via server_tokens off in nginx.conf
    add_header Server "rinkel" always;


    # ── Webhook endpoint ───────────────────────────────────────────────────
    # Higher rate: Rinkel may burst-send events
    location /api/v1/webhooks/ {
        limit_req zone=webhook burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://rinkel_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID    $request_id;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }

    # ── Export endpoints (heavier, lower rate) ─────────────────────────────
    location /api/v1/exports {
        limit_req zone=export burst=5 nodelay;
        limit_req_status 429;

        # Streaming responses need long timeouts
        proxy_buffering    off;
        proxy_read_timeout 300s;   # 5min for large JSONL exports
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;

        proxy_pass         http://rinkel_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID    $request_id;
    }

    # ── Health check (no rate limiting — used by monitors) ─────────────────
    location /health {
        proxy_pass         http://rinkel_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;

        access_log off;  # don't log monitor pings
    }

    # ── General API ───────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://rinkel_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID    $request_id;

        proxy_read_timeout  60s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }

    # ── Block everything else ──────────────────────────────────────────────
    location / {
        return 404;
    }

    # ── Custom error pages ────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error":"Rate limit exceeded","retry_after":60}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable"}';
    }
}
