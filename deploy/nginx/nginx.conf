# ── nginx.conf — Global Nginx configuration ───────────────────────────────────
# Optimized for a single-VPS deployment of the Rinkel call auditor.
# Handles: SSL termination, rate limiting, upstream proxy, security headers.

user nginx;
worker_processes auto;  # matches number of CPU cores
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # hide nginx version

    # ── Client limits ──────────────────────────────────────────────────────
    client_max_body_size     16m;   # webhook payloads + audio metadata
    client_body_timeout      30s;
    client_header_timeout    15s;
    send_timeout             30s;

    # ── Rate limiting zones ────────────────────────────────────────────────
    # Webhook endpoint: Rinkel sends bursts during business hours
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;
    # Export endpoint: heavier operations
    limit_req_zone $binary_remote_addr zone=export:10m  rate=10r/m;
    # General API
    limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types
        application/json
        application/x-ndjson
        text/plain
        text/xml;

    # ── SSL global settings ────────────────────────────────────────────────
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # HSTS: 2 years (add after you're confident SSL works correctly)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Upstream: FastAPI application ─────────────────────────────────────
    # upstream must be in http{} context, not inside server{} or conf.d
    upstream rinkel_api {
        server api:8000;
        keepalive 32;
    }

    # ── Include virtual hosts ──────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
